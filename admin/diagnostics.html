<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>WebDrop Admin</title>
  <meta http-equiv="refresh" content="0; url=./?tab=live">
</head>
<body>
  <script>
    const target = new URL("./", location.href);
    target.searchParams.set("tab", "live");
    for (const [key, value] of new URLSearchParams(location.search)) {
      if (key !== "tab") target.searchParams.set(key, value);
    }
    location.replace(target.href);
  </script>
  <p><a href="./?tab=live">Open WebDrop live testing</a></p>
</body>
</html>

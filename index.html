<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WebDrop</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>

<body>

  <!-- Settings Button -->
  <div class="settings-container">
    <button class="settings-btn" id="settingsBtn" title="Settings" aria-label="Open Settings">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
    <input type="file" id="document-upload" hidden multiple accept="*/*">
  </div>

  <!-- Dynamic Island (QR Scanner) -->
  <div class="dynamic-island" id="dynamicIsland">
    <div class="island-content">
      <video id="qr-video" autoplay playsinline></video>
      <div class="qr-overlay">
        <div class="qr-frame"></div>
        <p>Scan QR to pair</p>
      </div>
    </div>
  </div>

  <!-- Main scene: orbits + folder, centered on screen -->
  <div class="scene" id="scene">

    <!-- Orbit rings (behind everything) -->
    <div class="orbit-ring orbit-ring--1"></div>
    <div class="orbit-ring orbit-ring--2"></div>
    <div class="orbit-ring orbit-ring--3"></div>

    <!-- Ripple rings (shown during send/receive) -->
    <div class="ripple-ring ripple-ring--1" id="ripple1"></div>
    <div class="ripple-ring ripple-ring--2" id="ripple2"></div>
    <div class="ripple-ring ripple-ring--3" id="ripple3"></div>

    <!-- Nearby user avatars, each orbiting at a set position -->
    <div class="person-wrapper" style="--orbit-r: 210px; --orbit-angle: 0deg; --anim-dur: 25s">
      <div class="person">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Brian&backgroundColor=b6e3f4" alt="Brian" id="my-profile-pic">
        <span>Brian's iPhone</span>
      </div>
    </div>
    <div class="person-wrapper" style="--orbit-r: 310px; --orbit-angle: 120deg; --anim-dur: 40s">
      <div class="person">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex&backgroundColor=ffdfbf" alt="Alex">
        <span>Alex's iPad</span>
      </div>
    </div>
    <div class="person-wrapper" style="--orbit-r: 410px; --orbit-angle: 240deg; --anim-dur: 60s">
      <div class="person">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah&backgroundColor=c0aede" alt="Sarah">
        <span>Sarah's Mac</span>
      </div>
    </div>

    <!-- Central folder -->
    <div class="folder" id="folderEl">
      <div class="folder-back"></div>

      <div class="paper-stack" id="paper-stack">
        <div class="paper default-paper">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          <span>Add Files</span>
        </div>
      </div>

      <div class="folder-front" id="folderFront">
        <div class="folder-front-header">
          <span class="folder-title">WebDrop</span>
          <button class="folder-action-btn" id="folderActionBtn" aria-label="Send or Receive">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="7" y1="17" x2="17" y2="7"></line>
              <polyline points="7 7 17 7 17 17"></polyline>
            </svg>
          </button>
        </div>
        <div class="folder-front-footer">
          <span class="folder-count" id="folder-count">0 files</span>
          <div class="folder-storage">
            <span class="folder-storage-text" id="folder-storage-text">0/500 MB</span>
            <div class="folder-storage-bars" id="folder-bars">
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /scene -->

  <!-- Settings Modal (outside scene) -->
  <div class="settings-modal" id="settingsModal" role="dialog" aria-modal="true">
    <div class="settings-content">
      <div class="settings-header">
        <h3>Settings</h3>
        <button class="close-settings" id="closeSettings" aria-label="Close">&times;</button>
      </div>
      <div class="settings-body">
        <div class="setting-item">
          <span>Profile Picture</span>
          <label for="profile-upload" class="upload-btn">Upload</label>
          <input type="file" id="profile-upload" hidden accept="image/*">
        </div>
        <div class="setting-item">
          <span>Background Color</span>
          <input type="color" id="bg-color-picker" value="#000000">
        </div>
        <div class="setting-item">
          <span>Orbit Intensity</span>
          <input type="range" id="orbit-intensity" min="0.05" max="1" step="0.05" value="0.3">
        </div>
        <hr style="border:0;border-top:1px solid rgba(255,255,255,0.1);margin:10px 0;">
        <div class="setting-item">
          <span>Show Orbit Lines</span>
          <input type="checkbox" id="toggle-orbits" checked>
        </div>
        <div class="setting-item">
          <span>Show Icons</span>
          <input type="checkbox" id="toggle-icons" checked>
        </div>
        <div class="setting-item">
          <span>QR Scanner</span>
          <input type="checkbox" id="toggle-qr">
        </div>
        <hr style="border:0;border-top:1px solid rgba(255,255,255,0.1);margin:10px 0;">
        <div class="setting-item">
          <span style="font-size:11px;color:#666;" id="deviceInfoLabel">Detecting device…</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Action Bottom Sheet (outside scene, fixed to screen) -->
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="bottom-sheet" id="actionSheet" role="dialog" aria-modal="true" aria-label="File Actions">
    <div class="sheet-handle"></div>
    <p class="sheet-title">Choose Action</p>
    <div class="sheet-content">
      <button class="sheet-btn sheet-btn--send" id="btnSend">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
        <span>Send File</span>
      </button>
      <button class="sheet-btn sheet-btn--receive" id="btnReceive">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="8 17 12 21 16 17"></polyline>
          <line x1="12" y1="12" x2="12" y2="21"></line>
          <path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"></path>
        </svg>
        <span>Receive File</span>
      </button>
    </div>
    <button class="sheet-cancel" id="btnCancelSheet">Cancel</button>
  </div>

  <!-- Status Toast -->
  <div class="status-toast" id="statusToast"></div>

  <script type="module" src="app.js"></script>
  <script>
    /* ── Helpers ── */
    const $ = id => document.getElementById(id);
    const folderEl   = $('folderEl');
    const paperStack = $('paper-stack');
    const sheet      = $('actionSheet');
    const backdrop   = $('sheetBackdrop');

    let totalFiles = 0;
    let totalSizeMB = 0;
    const MAX_MB = 500;

    /* ── Toast ── */
    function showToast(msg, duration = 2500) {
      const t = $('statusToast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), duration);
    }

    /* ── Bottom Sheet ── */
    function openSheet() {
      sheet.classList.add('active');
      backdrop.classList.add('active');
    }
    function closeSheet() {
      sheet.classList.remove('active');
      backdrop.classList.remove('active');
    }
    window.openActionSheet = openSheet;

    $('btnCancelSheet').addEventListener('click', closeSheet);
    backdrop.addEventListener('click', closeSheet);

    $('btnSend').addEventListener('click', () => {
      closeSheet();
      folderEl.classList.remove('is-receiving');
      folderEl.classList.add('is-sending');
      $('document-upload').click();
    });

    $('btnReceive').addEventListener('click', () => {
      closeSheet();
      folderEl.classList.remove('is-sending');
      folderEl.classList.add('is-receiving');
      showToast('Waiting for incoming file…');
    });

    /* ── Folder toggle (open/close) ── */
    folderEl.addEventListener('click', () => folderEl.classList.toggle('is-open'));

    /* ── Folder action button → open sheet ── */
    $('folderActionBtn').addEventListener('click', e => {
      e.stopPropagation();
      openSheet();
    });

    /* ── File upload → update paper stack ── */
    $('document-upload').addEventListener('change', function(e) {
      const files = e.target.files;
      if (!files.length) return;

      // Hand off to WebRTC if available
      if (window.WebDrop) {
        Array.from(files).forEach(f => window.WebDrop.webrtcClient.sendFile(f));
      }

      if (totalFiles === 0) paperStack.innerHTML = '';

      Array.from(files).forEach((file, i) => {
        const sizeMB = Math.max(0.1, file.size / (1024 * 1024));
        totalSizeMB = Math.min(MAX_MB, totalSizeMB + sizeMB);

        const paper = document.createElement('div');
        paper.className = 'paper';
        const stackIdx = Math.min(totalFiles + i, 4);
        const offset   = stackIdx * 8;
        paper.style.bottom    = `${offset}px`;
        paper.style.transform = `translateX(-50%) scale(${1 - stackIdx * 0.02})`;
        paper.style.zIndex    = totalFiles + i;
        paper.innerHTML = `
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
          </svg>
          <span title="${file.name}">${file.name}</span>`;
        paperStack.appendChild(paper);
        totalFiles++;
      });

      // Update folder footer
      $('folder-count').textContent = `${totalFiles} file${totalFiles !== 1 ? 's' : ''}`;
      $('folder-storage-text').textContent = `${Math.round(totalSizeMB)}/${MAX_MB} MB`;
      const bars = document.querySelectorAll('#folder-bars .bar');
      const filled = Math.round((totalSizeMB / MAX_MB) * bars.length);
      bars.forEach((b, i) => b.classList.toggle('full', i < filled));

      folderEl.classList.remove('is-open');
      showToast(`${files.length} file(s) ready to send`);
      e.target.value = '';
    });

    /* ── Settings ── */
    $('settingsBtn').addEventListener('click', () => $('settingsModal').classList.add('active'));
    $('closeSettings').addEventListener('click', () => $('settingsModal').classList.remove('active'));
    $('settingsModal').addEventListener('click', e => {
      if (e.target === $('settingsModal')) $('settingsModal').classList.remove('active');
    });

    $('profile-upload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => { $('my-profile-pic').src = ev.target.result; };
      reader.readAsDataURL(file);
    });

    $('bg-color-picker').addEventListener('input', e => {
      document.body.style.background = e.target.value;
    });

    $('orbit-intensity').addEventListener('input', e => {
      document.querySelectorAll('.orbit-ring').forEach(r => {
        r.style.borderColor = `rgba(255,255,255,${e.target.value})`;
      });
    });

    $('toggle-orbits').addEventListener('change', e => {
      document.querySelectorAll('.orbit-ring').forEach(r => {
        r.style.borderStyle = e.target.checked ? 'dashed' : 'none';
      });
    });

    $('toggle-icons').addEventListener('change', e => {
      document.querySelectorAll('.person').forEach(p => {
        p.style.display = e.target.checked ? 'flex' : 'none';
      });
    });

    $('toggle-qr').addEventListener('change', async e => {
      if (e.target.checked) {
        $('dynamicIsland').classList.add('active');
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          $('qr-video').srcObject = stream;
        } catch (err) {
          showToast('Camera access denied');
          e.target.checked = false;
          $('dynamicIsland').classList.remove('active');
        }
      } else {
        $('dynamicIsland').classList.remove('active');
        if ($('qr-video').srcObject) {
          $('qr-video').srcObject.getTracks().forEach(t => t.stop());
          $('qr-video').srcObject = null;
        }
      }
    });

    /* ── Device info (populated by ES module app.js) ── */
    window.addEventListener('webdrop:ready', e => {
      $('deviceInfoLabel').textContent = `Device: ${e.detail.deviceType}`;
    });
  </script>
</body>

</html>

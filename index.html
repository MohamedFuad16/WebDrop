<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ウェブドロップ | WebDrop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260605">
  <!-- QR code generation -->
  <script src="js/lib/qrcode.min.js"></script>
  <!-- QR code scanning -->
  <script src="js/lib/jsQR.min.js"></script>
</head>

<body>

  <!-- ── Settings Button ── -->
  <div class="settings-container">
    <button class="settings-btn" id="settingsBtn" aria-label="設定 / Settings">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="7.25" stroke="currentColor" stroke-width="2.1"></circle>
        <circle cx="12" cy="12" r="2.7" stroke="currentColor" stroke-width="2.1"></circle>
        <path d="M12 2.8v2.15M12 19.05v2.15M2.8 12h2.15M19.05 12h2.15" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"></path>
      </svg>
    </button>
    <!-- Hidden inputs -->
    <input type="file" id="document-upload" hidden multiple accept="*/*">
    <input type="file" id="profile-upload" hidden accept="image/*">
  </div>

  <!-- ── Dynamic Island (QR Scanner / Creator) ── -->
  <div class="dynamic-island" id="dynamicIsland" aria-label="QR pairing" aria-expanded="false">
    <div class="island-content">
      <div class="island-mode" id="islandScanMode">
        <video id="qr-video" autoplay playsinline muted></video>
        <div class="qr-overlay">
          <div class="qr-corner qr-corner--tl"></div>
          <div class="qr-corner qr-corner--tr"></div>
          <div class="qr-corner qr-corner--bl"></div>
          <div class="qr-corner qr-corner--br"></div>
          <p data-ja="QRコードをスキャン" data-en="Scan QR Code">QRコードをスキャン</p>
        </div>
      </div>
      <div class="island-mode" id="islandCreateMode" style="display:none;">
        <div class="qr-create-inner">
          <!-- Use <img> not <canvas> — avoids hidden-element zero-size rendering bug -->
          <img id="qr-img" alt="QR Code" style="width:200px;height:200px;border-radius:8px;display:none;">
          <div class="qr-spinner" id="qrSpinner">
            <div class="searching-spinner" style="width:28px;height:28px;border-width:3px;"></div>
          </div>
          <p data-ja="このQRコードをスキャン" data-en="Scan this to connect">このQRコードをスキャン</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Scene: zero-size centred anchor for all spatial elements ── -->
  <div class="scene" id="scene">

    <!-- Orbit rings -->
    <div class="orbit-ring orbit-ring--1"></div>
    <div class="orbit-ring orbit-ring--2"></div>
    <div class="orbit-ring orbit-ring--3"></div>

    <!-- Ripple rings (appear during search) -->
    <div class="ripple-ring ripple-ring--1"></div>
    <div class="ripple-ring ripple-ring--2"></div>
    <div class="ripple-ring ripple-ring--3"></div>

    <!-- Nearby person avatars — injected by JS from WebSocket peers -->
    <!-- Self avatar always visible at orbit 1 -->
    <div class="person-wrapper" id="selfWrapper" style="--orbit-r:210px;--orbit-angle:0deg;--anim-dur:0s;animation:none;transform:translate(-50%,-50%) translateX(0) translateY(calc(-1 * 210px));">
      <div class="person" id="selfPerson" data-peer-id="self">
        <img id="my-profile-pic" src="" alt="Me">
        <span id="myNameLabel"></span>
      </div>
    </div>
    <!-- Dynamic peers container -->
    <div id="peersContainer"></div>

    <!-- ── Central Folder ── -->
    <div class="folder" id="folderEl">

      <!-- Folder body (back) -->
      <div class="folder-back"></div>

      <!-- Paper / file card stack (sits INSIDE folder, covered by front when closed) -->
      <div class="paper-stack" id="paper-stack" role="button" aria-label="ファイルを選択 / Select file">
        <div class="paper default-paper" id="defaultPaper">
          <svg class="default-file-icon" width="46" height="46" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M28 6H15a5 5 0 0 0-5 5v26a5 5 0 0 0 5 5h18a5 5 0 0 0 5-5V16L28 6z"></path>
            <path d="M28 6v10h10"></path>
            <path d="M24 21v12"></path>
            <path d="M18 27h12"></path>
          </svg>
          <span class="paper-label" data-ja="追加" data-en="Add">追加</span>
        </div>
      </div>

      <!-- Folder front face (glassmorphism lid) -->
      <div class="folder-front" id="folderFront">
        <div class="folder-front-header">
          <span class="folder-title" data-ja="ウェブドロップ" data-en="WebDrop">ウェブドロップ</span>
          <!-- Send/Receive action button — glows when file is ready -->
          <div class="folder-action-rail">
            <button class="folder-action-btn" id="folderActionBtn" aria-label="送信・受信 / Send or Receive" disabled>
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
            <button class="folder-qr-btn folder-action-btn" id="folderQrBtn" aria-label="QRスキャン / Scan QR">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h6v6H4z"></path>
                <path d="M14 4h6v6h-6z"></path>
                <path d="M4 14h6v6H4z"></path>
                <path d="M14 14h2"></path>
                <path d="M20 14v2"></path>
                <path d="M16 18h4v2"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="folder-front-footer">
          <span class="folder-count" id="folder-count">0 <span data-ja="ファイル" data-en="files">ファイル</span></span>
          <div class="folder-storage">
            <span class="folder-storage-text" id="folder-storage-text">0/500 MB</span>
            <div class="folder-storage-bars" id="folder-bars">
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div><div class="bar"></div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /folder -->

    <!-- Searching label (appears below folder during search) -->
    <div class="searching-label" id="searchingLabel">
      <div class="searching-spinner"></div>
      <span data-ja="端末を検索中…" data-en="Searching for devices…">端末を検索中…</span>
    </div>

  </div><!-- /scene -->

  <!-- ── Settings Modal ── -->
  <div class="settings-modal" id="settingsModal" role="dialog" aria-modal="true">
    <div class="settings-content">
      <div class="settings-header">
        <div>
          <h3 data-ja="設定" data-en="Settings">設定</h3>
          <p class="settings-subtitle" data-ja="接続と表示を管理" data-en="Connection and appearance">接続と表示を管理</p>
        </div>
        <button class="close-settings" id="closeSettings" aria-label="閉じる / Close">&times;</button>
      </div>
      <div class="settings-body">
        <!-- User profile row -->
        <div class="setting-item setting-item--profile">
          <div class="user-identity">
            <img id="settings-avatar" src="" alt="Avatar" class="settings-avatar">
            <div class="user-identity-text">
              <input type="text" id="userNameInput" class="username-input" placeholder="ユーザー名 / Your Name" maxlength="24">
              <span class="user-id-label" id="userIdLabel"></span>
            </div>
          </div>
          <label for="profile-upload" class="upload-btn" data-ja="写真" data-en="Photo">写真</label>
        </div>
        <div class="settings-connection">
          <span class="settings-connection-dot" id="settingsWsDot" data-status="connecting"></span>
          <div class="settings-connection-copy">
            <span data-ja="シグナリングサーバー" data-en="Signaling server">シグナリングサーバー</span>
            <small id="settingsWsState" data-ja="接続中…" data-en="Connecting…">接続中…</small>
          </div>
        </div>
        <div class="setting-item setting-item--control">
          <span data-ja="背景色" data-en="Background">背景色</span>
          <input type="color" id="bg-color-picker" value="#000000">
        </div>
        <div class="setting-item setting-item--control">
          <span data-ja="軌道の強さ" data-en="Orbit Intensity">軌道の強さ</span>
          <input type="range" id="orbit-intensity" min="0.05" max="1" step="0.05" value="0.3">
        </div>
        <div class="setting-item setting-item--control">
          <span data-ja="軌道を表示" data-en="Show Orbits">軌道を表示</span>
          <input type="checkbox" id="toggle-orbits" checked>
        </div>
        <div class="setting-item setting-item--control">
          <span data-ja="実写真のみ表示" data-en="Real Photos Only">実写真のみ表示</span>
          <input type="checkbox" id="toggle-real-photos">
        </div>
        <div class="setting-item setting-item--control">
          <span data-ja="アイコンを表示" data-en="Show Icons">アイコンを表示</span>
          <input type="checkbox" id="toggle-icons" checked>
        </div>
        <div class="setting-item setting-item--qr" id="qr-pairing-row">
          <div class="qr-pairing-info">
            <span id="qrPairingLabel" data-ja="QRペアリング" data-en="QR Pairing">QRペアリング</span>
            <span class="qr-device-sub" id="qrDeviceSub"></span>
          </div>
          <!-- Button injected by JS based on device type -->
          <button class="qr-mini-btn qr-mini-btn--primary" id="btnQRAction"></button>
        </div>
        <hr class="divider">
        <!-- Device banner -->
        <div class="device-banner" id="deviceBanner">
          <span class="device-banner-icon" id="deviceBannerIcon"></span>
          <div class="device-banner-text">
            <span class="device-banner-name" id="deviceBannerName"></span>
            <span class="device-banner-role" id="deviceBannerRole"></span>
          </div>
        </div>
        <div class="setting-item" style="opacity:0.5;font-size:11px;" id="deviceInfoLabel">
          Device: detecting…
        </div>
      </div>
    </div>
  </div>

  <!-- ── Action Bottom Sheet ── -->
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="bottom-sheet" id="actionSheet" role="dialog" aria-modal="true">
    <div class="sheet-handle"></div>
    <p class="sheet-title" data-ja="アクションを選択" data-en="Choose Action">アクションを選択</p>
    <div class="sheet-content">
      <button class="sheet-btn sheet-btn--send" id="btnSend">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
        <div class="sheet-btn-text">
          <span class="sheet-btn-title" data-ja="ファイルを送信" data-en="Send File">ファイルを送信</span>
          <span class="sheet-btn-sub" data-ja="ファイルを選択して送信" data-en="Pick a file to send">ファイルを選択して送信</span>
        </div>
      </button>
      <button class="sheet-btn sheet-btn--receive" id="btnReceive">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="8 17 12 21 16 17"></polyline>
          <line x1="12" y1="12" x2="12" y2="21"></line>
          <path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"></path>
        </svg>
        <div class="sheet-btn-text">
          <span class="sheet-btn-title" data-ja="ファイルを受信" data-en="Receive File">ファイルを受信</span>
          <span class="sheet-btn-sub" data-ja="ファイルの受信を待機" data-en="Wait for incoming file">ファイルの受信を待機</span>
        </div>
      </button>
    </div>
    <button class="sheet-cancel" id="btnCancelSheet" data-ja="キャンセル" data-en="Cancel">キャンセル</button>
  </div>

  <!-- ── Status Toast ── -->
  <div class="status-toast" id="statusToast"></div>

  <!-- ── Debug / Status Bar (bottom strip) ── -->
  <div class="status-bar" id="statusBar">
    <div class="stat-item" id="stat-mic">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
      <span data-ja="マイク" data-en="Mic">マイク</span>
      <span class="stat-dot" data-status="unknown"></span>
    </div>
    <div class="stat-item" id="stat-ws">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
      <span data-ja="接続" data-en="WS">接続</span>
      <span class="stat-dot" data-status="unknown"></span>
    </div>
    <div class="stat-item" id="stat-tilt">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
      <span data-ja="傾き" data-en="Tilt">傾き</span>
      <span class="stat-dot" data-status="unknown"></span>
    </div>
    <div class="stat-item" id="stat-bump">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
      <span data-ja="振動" data-en="Bump">振動</span>
      <span class="stat-dot" data-status="unknown"></span>
    </div>
    <div class="stat-item" id="stat-ultra">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
      <span data-ja="超音波" data-en="Ultra">超音波</span>
      <span class="stat-dot" data-status="unknown"></span>
    </div>
  </div>

  <!-- ── Permission Request Overlay ── -->
  <div class="perm-overlay" id="permOverlay" style="display:none;">
    <div class="perm-card">
      <div class="perm-icon">🎤</div>
      <h3 id="permTitle">マイクへのアクセス</h3>
      <p id="permDesc">近くの端末を超音波で検出するためにマイクが必要です。</p>
      <button class="perm-allow-btn" id="permAllowBtn" data-ja="許可する" data-en="Allow">許可する</button>
      <button class="perm-skip-btn" id="permSkipBtn" data-ja="スキップ" data-en="Skip">スキップ</button>
    </div>
  </div>

  <script type="module" src="app.js?v=20260605"></script>
  <script>
    'use strict';

    /* ────────────────────────────────────
       i18n — detect browser language
    ──────────────────────────────────── */
    const LANG = navigator.language.startsWith('ja') ? 'ja' : 'en';
    document.documentElement.lang = LANG === 'ja' ? 'ja' : 'en';

    function applyI18n() {
      document.querySelectorAll('[data-ja]').forEach(el => {
        el.textContent = LANG === 'ja' ? el.dataset.ja : el.dataset.en;
      });
    }
    applyI18n();

    function t(ja, en) { return LANG === 'ja' ? ja : en; }

    /* ────────────────────────────────────
       Utility
    ──────────────────────────────────── */
    const $ = id => document.getElementById(id);

    const folderEl    = $('folderEl');
    const paperStack  = $('paper-stack');
    const sheet       = $('actionSheet');
    const backdrop    = $('sheetBackdrop');
    const actionBtn   = $('folderActionBtn');
    const folderQrBtn = $('folderQrBtn');
    const searchLabel = $('searchingLabel');

    let totalFiles  = 0;
    let totalSizeMB = 0;
    const MAX_MB    = 500;

    /* ────────────────────────────────────
       App State Machine
    ──────────────────────────────────── */
    const STATE = { IDLE: 'idle', OPEN: 'open', SHEET: 'sheet',
                    FILE_READY: 'file_ready', SEARCHING: 'searching' };
    let appState = STATE.IDLE;

    function setState(next) {
      appState = next;
      folderEl.dataset.state = next;
      $('scene').dataset.state = next;
      searchLabel.classList.toggle('visible', next === STATE.SEARCHING);
      actionBtn.disabled = next !== STATE.FILE_READY && next !== STATE.SEARCHING;
    }

    /* ────────────────────────────────────
       Toast
    ──────────────────────────────────── */
    function showToast(msg, ms = 2500) {
      const el = $('statusToast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), ms);
    }

    /* ────────────────────────────────────
       Status bar helpers
    ──────────────────────────────────── */
    function setStatDot(key, status) { // 'granted'|'denied'|'unknown'|'connected'|'disconnected'
      const el = document.querySelector(`#stat-${key} .stat-dot`);
      if (el) el.dataset.status = status;
    }

    /* ────────────────────────────────────
       Permission Cache (localStorage)
    ──────────────────────────────────── */
    const PermCache = {
      get:  key => localStorage.getItem(`wd_perm_${key}`),
      set:  (key, val) => localStorage.setItem(`wd_perm_${key}`, val),
      clear: key => localStorage.removeItem(`wd_perm_${key}`)
    };

    /* Generic permission overlay (sequential, one at a time) */
    const permQueue = [];
    let permRunning = false;

    function queuePermOverlay(opts) {
      return new Promise(resolve => {
        permQueue.push({ ...opts, resolve });
        if (!permRunning) runNextPerm();
      });
    }

    function runNextPerm() {
      if (!permQueue.length) { permRunning = false; return; }
      permRunning = true;
      const { icon, title, desc, onAllow, resolve } = permQueue.shift();

      $('permOverlay').style.display = 'flex';
      $('permOverlay').querySelector('.perm-icon').textContent   = icon;
      $('permTitle').textContent = title;
      $('permDesc').textContent  = desc;

      const allowBtn = $('permAllowBtn');
      const skipBtn  = $('permSkipBtn');

      const cleanup = () => { $('permOverlay').style.display = 'none'; };

      allowBtn.onclick = async () => {
        cleanup();
        const result = await onAllow();
        resolve(result);
        runNextPerm();
      };
      skipBtn.onclick = () => {
        cleanup();
        resolve(false);
        runNextPerm();
      };
    }

    /* ── Microphone (ultrasound) ── */
    async function requestMic() {
      const cached = PermCache.get('mic');
      if (cached === 'granted') { setStatDot('mic', 'granted'); setStatDot('ultra', 'granted'); return true; }
      if (cached === 'denied')  { setStatDot('mic', 'denied');  setStatDot('ultra', 'denied');  return false; }

      setStatDot('mic',   'checking');
      setStatDot('ultra', 'checking');

      // Check without prompting first (Chrome/Android)
      try {
        const perm = await navigator.permissions.query({ name: 'microphone' });
        if (perm.state === 'granted') {
          PermCache.set('mic', 'granted');
          setStatDot('mic', 'granted'); setStatDot('ultra', 'granted');
          return true;
        }
        if (perm.state === 'denied') {
          PermCache.set('mic', 'denied');
          setStatDot('mic', 'denied'); setStatDot('ultra', 'denied');
          return false;
        }
      } catch {/* query not supported */}

      // Need to ask via overlay
      return queuePermOverlay({
        icon: '🎤',
        title: t('マイクへのアクセス', 'Microphone Access'),
        desc: t(
          '近くの端末を超音波で検出するためにマイクが必要です。録音はしません。',
          'Required for ultrasound proximity detection. No audio is recorded.'
        ),
        onAllow: async () => {
          try {
            await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false } });
            PermCache.set('mic', 'granted');
            setStatDot('mic', 'granted'); setStatDot('ultra', 'granted');
            return true;
          } catch {
            PermCache.set('mic', 'denied');
            setStatDot('mic', 'denied'); setStatDot('ultra', 'denied');
            return false;
          }
        }
      });
    }

    /* ── Bump (DeviceMotion) ── */
    async function requestMotion() {
      const cached = PermCache.get('bump');
      if (cached === 'granted') { setStatDot('bump', 'granted'); return true; }
      if (cached === 'denied')  { setStatDot('bump', 'denied');  return false; }

      // iOS 13+ requires explicit prompt (must come from user gesture)
      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        setStatDot('bump', 'checking');
        return queuePermOverlay({
          icon: '📳',
          title: t('振動検出の許可', 'Motion Detection'),
          desc: t(
            '2台の端末を近づけたときのバンプを検出します。',
            'Detects when two devices are bumped together for proximity pairing.'
          ),
          onAllow: async () => {
            try {
              const r = await DeviceMotionEvent.requestPermission();
              PermCache.set('bump', r);
              setStatDot('bump', r === 'granted' ? 'granted' : 'denied');
              return r === 'granted';
            } catch {
              PermCache.set('bump', 'denied');
              setStatDot('bump', 'denied');
              return false;
            }
          }
        });
      }

      // Android / Desktop — always available, no prompt needed
      PermCache.set('bump', 'granted');
      setStatDot('bump', 'granted');
      return true;
    }

    /* ── Tilt (DeviceOrientation) ── */
    async function requestOrientation() {
      const cached = PermCache.get('tilt');
      if (cached === 'granted') { setStatDot('tilt', 'granted'); return true; }
      if (cached === 'denied')  { setStatDot('tilt', 'denied');  return false; }

      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        setStatDot('tilt', 'checking');
        return queuePermOverlay({
          icon: '📐',
          title: t('傾き検出の許可', 'Orientation Access'),
          desc: t(
            '端末を傾けて相手に向けることで接続を確立します。',
            'Used to pair devices by pointing them at each other.'
          ),
          onAllow: async () => {
            try {
              const r = await DeviceOrientationEvent.requestPermission();
              PermCache.set('tilt', r);
              setStatDot('tilt', r === 'granted' ? 'granted' : 'denied');
              return r === 'granted';
            } catch {
              PermCache.set('tilt', 'denied');
              setStatDot('tilt', 'denied');
              return false;
            }
          }
        });
      }

      PermCache.set('tilt', 'granted');
      setStatDot('tilt', 'granted');
      return true;
    }

    /* Request all permissions sequentially */
    async function requestAllPermissions() {
      await requestMic();
      await requestMotion();
      await requestOrientation();
    }

    /* ────────────────────────────────────
       Folder click → open / close
    ──────────────────────────────────── */
    folderEl.addEventListener('click', () => {
      const nextOpen = !folderEl.classList.contains('is-open');
      folderEl.classList.toggle('is-open', nextOpen);
      setState(nextOpen ? STATE.OPEN : (totalFiles > 0 ? STATE.FILE_READY : STATE.IDLE));
    });

    /* ────────────────────────────────────
       Paper stack click → open sheet
    ──────────────────────────────────── */
    paperStack.addEventListener('click', e => {
      if (!folderEl.classList.contains('is-open')) return;

      const frontTop = $('folderFront').getBoundingClientRect().top;
      const clickedVisiblePaper = e.clientY < frontTop - 8;
      if (!clickedVisiblePaper) return;

      e.stopPropagation();
      openSheet();
    });

    /* ────────────────────────────────────
       Action button (send when file ready)
    ──────────────────────────────────── */
    actionBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (appState === STATE.FILE_READY) {
        startSearching();
      }
    });

    /* ────────────────────────────────────
       Bottom Sheet
    ──────────────────────────────────── */
    function openSheet() {
      sheet.classList.add('active');
      backdrop.classList.add('active');
      setState(STATE.SHEET);
    }
    function closeSheet() {
      sheet.classList.remove('active');
      backdrop.classList.remove('active');
      // Restore previous state
      if (totalFiles > 0) {
        setState(STATE.FILE_READY);
        folderEl.classList.remove('is-open');
      } else {
        setState(STATE.OPEN);
      }
    }

    $('btnCancelSheet').addEventListener('click', closeSheet);
    backdrop.addEventListener('click', closeSheet);

    $('btnSend').addEventListener('click', () => {
      closeSheet();
      folderEl.classList.remove('is-open');
      // Request permissions on first send attempt
      requestAllPermissions();
      $('document-upload').click();
    });

    $('btnReceive').addEventListener('click', () => {
      closeSheet();
      folderEl.classList.remove('is-open');
      setState(STATE.SEARCHING);
      showToast(t('ファイルの受信を待機中…', 'Waiting for incoming file…'), 4000);
      requestAllPermissions();
    });

    /* ────────────────────────────────────
       File Upload → paper preview
    ──────────────────────────────────── */
    $('document-upload').addEventListener('change', function(e) {
      const files = Array.from(e.target.files);
      if (!files.length) return;

      if (window.WebDrop) files.forEach(f => window.WebDrop.webrtcClient.sendFile(f));

      // Clear default paper on first upload
      if (totalFiles === 0) paperStack.innerHTML = '';

      files.forEach((file, i) => {
        totalSizeMB = Math.min(MAX_MB, totalSizeMB + Math.max(0.1, file.size / 1048576));

        const paper  = document.createElement('div');
        paper.className = 'paper';
        const stackIdx  = Math.min(totalFiles + i, 3);
        const offset    = stackIdx * 6;
        paper.style.cssText = `bottom:${offset}px;z-index:${totalFiles+i};`;

        // Determine icon colour by extension
        const ext = (file.name.split('.').pop() || '').toLowerCase();
        const iconColor = ext === 'pdf' ? '#e53935'
          : ['doc','docx'].includes(ext) ? '#1565c0'
          : ['jpg','jpeg','png','gif','webp'].includes(ext) ? '#6a1b9a'
          : '#37474f';

        paper.innerHTML = `
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
          </svg>
          <span class="paper-filename" title="${file.name}">${file.name}</span>`;

        paperStack.appendChild(paper);
        totalFiles++;
      });

      // Update footer
      $('folder-count').innerHTML = `${totalFiles} <span data-ja="ファイル" data-en="files">${t('ファイル','files')}</span>`;
      $('folder-storage-text').textContent = `${Math.round(totalSizeMB)}/${MAX_MB} MB`;
      const bars   = document.querySelectorAll('#folder-bars .bar');
      const filled = Math.round((totalSizeMB / MAX_MB) * bars.length);
      bars.forEach((b, i) => b.classList.toggle('full', i < filled));

      folderEl.classList.remove('is-open');
      setState(STATE.FILE_READY);
      showToast(t(`${files.length}件のファイルを準備完了`, `${files.length} file(s) ready — tap ↗ to send`));
      e.target.value = '';
    });

    /* ────────────────────────────────────
       User Identity  (localStorage-persisted)
    ──────────────────────────────────── */
    const USER = {
      id:    localStorage.getItem('wd_user_id')    || crypto.randomUUID(),
      name:  localStorage.getItem('wd_user_name')  || '',
      photo: localStorage.getItem('wd_user_photo') || ''   // base64 data URL
    };

    // Persist ID immediately
    localStorage.setItem('wd_user_id', USER.id);

    function fallbackAvatar(seed) {
      let hash = 0;
      for (const ch of seed) hash = (hash * 31 + ch.charCodeAt(0)) >>> 0;
      const skin = ['#ffd2a1', '#f2b37e', '#d89262', '#f6c7a0'][hash % 4];
      const hair = ['#f58aa9', '#d8c37f', '#7f5438', '#22242b'][(hash >> 2) % 4];
      const shirt = ['#4f8cff', '#42d982', '#9b8cff', '#f2b85b'][(hash >> 4) % 4];
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
          <rect width="96" height="96" rx="48" fill="#bdeaff"/>
          <circle cx="48" cy="42" r="22" fill="${skin}"/>
          <path d="M26 38c3-18 16-25 31-21 9 2 14 9 14 19-13-7-29-5-45 2z" fill="${hair}"/>
          <path d="M25 96c4-22 15-32 23-32s19 10 23 32H25z" fill="${shirt}"/>
          <path d="M40 45h16" stroke="#25262a" stroke-width="4" stroke-linecap="round"/>
          <circle cx="39" cy="39" r="3" fill="#25262a"/>
          <circle cx="57" cy="39" r="3" fill="#25262a"/>
        </svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    // Generate default name from device type if none stored yet
    if (!USER.name) {
      const adjectives = LANG === 'ja'
        ? ['素早い','明るい','青い','緑の','赤い']
        : ['Swift', 'Bright', 'Cool', 'Quick', 'Clear'];
      const nouns = LANG === 'ja'
        ? ['ドロップ','ウェーブ','リンク','フロー']
        : ['Drop', 'Wave', 'Link', 'Flow'];
      // Will be set after DEVICE is defined — stored after DEVICE block
    }

    function applyUserIdentity() {
      const name = USER.name || `${DEVICE.label} ${USER.id.slice(0, 4).toUpperCase()}`;
      // Self avatar in orbit
      $('myNameLabel').textContent = name;
      const selfImg = $('my-profile-pic');
      selfImg.src = USER.photo
        || fallbackAvatar(USER.id);
      // Settings panel
      $('settings-avatar').src = selfImg.src;
      $('userNameInput').value = name;
      $('userIdLabel').textContent = `ID: ${USER.id.slice(0, 8)}…`;
      $('selfPerson').dataset.hasPhoto = USER.photo ? 'true' : 'false';
    }

    /* Save name when user edits the input */
    document.addEventListener('DOMContentLoaded', () => {});  // warmup
    // (fired after DOMContentLoaded since this is in an inline script at end of body)
    $('userNameInput').addEventListener('input', e => {
      USER.name = e.target.value.trim();
      localStorage.setItem('wd_user_name', USER.name);
      $('myNameLabel').textContent = USER.name || `${DEVICE.label} ${USER.id.slice(0,4).toUpperCase()}`;
      if (window.WebDrop) {
        window.WebDrop.displayName = USER.name || $('myNameLabel').textContent;
      }
      broadcastMyProfile();
    });

    /* Profile photo upload — stores base64, updates both orbit + settings avatars */
    $('profile-upload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const dataUrl = ev.target.result;
        USER.photo = dataUrl;
        localStorage.setItem('wd_user_photo', dataUrl);
        // Update all avatar instances
        $('my-profile-pic').src   = dataUrl;
        $('settings-avatar').src  = dataUrl;
        // Mark self orbit element as having a real photo
        $('selfPerson').dataset.hasPhoto = 'true';
        broadcastMyProfile();
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    });

    /* Broadcast my profile to all connected peers via WebSocket */
    function broadcastMyProfile() {
      if (window.WebDrop && window.WebDrop.wsClient) {
        window.WebDrop.wsClient.send({
          type: 'profile_update',
          payload: {
            userId:    USER.id,
            name:      USER.name || $('myNameLabel').textContent,
            photoUrl:  USER.photo,
            deviceType: DEVICE.type
          }
        });
      }
    }

    /* ── Peer Orbit Rendering ── */
    const ORBIT_RADII  = [210, 310, 410];
    const ORBIT_DURS   = [25, 38, 55];
    const ORBIT_ANGLES = [90, 210, 330]; // deg offsets for peers (self is at 0)
    const peerMap      = new Map(); // peerId → { name, photo, hasPhoto, el }

    function renderPeer(peerId, name, photoUrl, deviceType) {
      const showReal    = $('toggle-real-photos').checked;
      const showIcons   = $('toggle-icons').checked;
      const hasPhoto    = !!photoUrl;

      if (peerMap.has(peerId)) {
        // Update existing
        const entry = peerMap.get(peerId);
        entry.name    = name;
        entry.photo   = photoUrl;
        entry.hasPhoto = hasPhoto;
        const img  = entry.el.querySelector('img');
        const span = entry.el.querySelector('span');
        img.src    = photoUrl || fallbackAvatar(peerId);
        span.textContent = name;
        entry.el.closest('.person-wrapper').style.display =
          (showReal && !hasPhoto) || !showIcons ? 'none' : '';
        return;
      }

      // New peer — pick next available orbit slot
      const slotIdx = peerMap.size;
      const r   = ORBIT_RADII[slotIdx]  || (410 + (slotIdx - 2) * 80);
      const ang = ORBIT_ANGLES[slotIdx] || (slotIdx * 120);
      const dur = ORBIT_DURS[slotIdx]   || 60;

      const wrapper = document.createElement('div');
      wrapper.className = 'person-wrapper';
      wrapper.style.cssText = `--orbit-r:${r}px;--orbit-angle:${ang}deg;--anim-dur:${dur}s`;

      const imgSrc = photoUrl || fallbackAvatar(peerId);

      wrapper.innerHTML = `
        <div class="person" data-peer-id="${peerId}" data-has-photo="${hasPhoto}">
          <img src="${imgSrc}" alt="${name}">
          <span>${name}</span>
        </div>`;

      if ((showReal && !hasPhoto) || !showIcons) wrapper.style.display = 'none';

      $('peersContainer').appendChild(wrapper);
      peerMap.set(peerId, { name, photo: photoUrl, hasPhoto, el: wrapper.querySelector('.person') });
    }

    function removePeer(peerId) {
      const entry = peerMap.get(peerId);
      if (entry) { entry.el.closest('.person-wrapper').remove(); peerMap.delete(peerId); }
    }

    /* Receive profile updates from remote peers */
    window.addEventListener('webdrop:profile_update', e => {
      const { userId, name, photoUrl, deviceType } = e.detail;
      if (userId === USER.id) return; // ignore self
      renderPeer(userId, name, photoUrl, deviceType);
    });

    /* When WebSocket delivers users list */
    window.addEventListener('webdrop:users_discovered', e => {
      const users = e.detail;
      const activePeerIds = new Set();
      users.forEach(u => {
        if (u.clientId !== USER.id) {
          activePeerIds.add(u.clientId);
          renderPeer(u.clientId, u.displayName, u.photoUrl || '', u.deviceType);
        }
      });
      peerMap.forEach((entry, peerId) => {
        if (!activePeerIds.has(peerId)) removePeer(peerId);
      });
    });

    /* ── Real Photos Toggle ── */
    $('toggle-real-photos').addEventListener('change', e => {
      const showRealOnly = e.target.checked;
      // Self orbit: always show (user themselves)
      // Peers
      peerMap.forEach((entry, peerId) => {
        const hide = showRealOnly && !entry.hasPhoto;
        entry.el.closest('.person-wrapper').style.display = hide ? 'none' : '';
      });
    });

    $('bg-color-picker').addEventListener('input', e => { document.body.style.background = e.target.value; });

    $('orbit-intensity').addEventListener('input', e => {
      document.querySelectorAll('.orbit-ring').forEach(r => {
        r.style.borderColor = `rgba(255,255,255,${e.target.value})`;
      });
    });

    $('toggle-orbits').addEventListener('change', e => {
      document.querySelectorAll('.orbit-ring').forEach(r => {
        r.style.borderStyle = e.target.checked ? 'dashed' : 'none';
      });
    });

    $('toggle-icons').addEventListener('change', e => {
      const show = e.target.checked;
      $('selfWrapper').style.display = show ? '' : 'none';
      peerMap.forEach(entry => {
        const showRealOnly = $('toggle-real-photos').checked;
        const hide = !show || (showRealOnly && !entry.hasPhoto);
        entry.el.closest('.person-wrapper').style.display = hide ? 'none' : '';
      });
    });



    /* ────────────────────────────────────
       Device Detection
    ──────────────────────────────────── */
    const DEVICE = (function detectDevice() {
      const ua  = navigator.userAgent  || '';
      const pf  = navigator.platform   || '';
      const vnd = navigator.vendor     || '';

      // iPhone / iPod / older iPad
      if (/iPhone|iPod/.test(ua) && !window.MSStream) {
        return { type: 'iPhone', label: 'iPhone', icon: '📱', qrRole: 'scan' };
      }
      // iPad (modern iPads report MacIntel platform when desktop mode is off)
      if (/iPad/.test(ua) || (pf === 'MacIntel' && navigator.maxTouchPoints > 1)) {
        return { type: 'iPad', label: 'iPad', icon: '📱', qrRole: 'scan' };
      }
      // Android
      if (/Android/i.test(ua)) {
        const isTablet = !/Mobile/.test(ua);
        return { type: 'Android', label: isTablet ? 'Android Tablet' : 'Android', icon: '🤖', qrRole: 'scan' };
      }
      // macOS
      if (/Mac/.test(pf) || /Macintosh/.test(ua)) {
        return { type: 'Mac', label: 'Mac', icon: '💻', qrRole: 'create' };
      }
      // Windows
      if (/Win/.test(pf) || /Windows/.test(ua)) {
        return { type: 'Windows', label: 'Windows PC', icon: '🖥️', qrRole: 'create' };
      }
      // Linux / Other Desktop
      return { type: 'Desktop', label: 'Desktop', icon: '🖥️', qrRole: 'create' };
    })();

    /* Apply device info to Settings UI */
    function applyDeviceUI() {
      // Device banner
      $('deviceBannerIcon').textContent = DEVICE.icon;
      $('deviceBannerName').textContent = DEVICE.label;
      $('deviceBannerRole').textContent = DEVICE.qrRole === 'create'
        ? t('QRコードを作成してモバイルに表示', 'Creates QR code for mobile to scan')
        : t('PCのQRコードをスキャンして接続', 'Scans QR code shown on PC');

      // QR action button text
      const btn = $('btnQRAction');
      if (DEVICE.qrRole === 'create') {
        btn.textContent = t('QRコード表示', 'Show QR');
        btn.dataset.role = 'create';
      } else {
        btn.textContent = t('QRスキャン', 'Scan QR');
        btn.dataset.role = 'scan';
      }

      // Sub-label
      $('qrDeviceSub').textContent = DEVICE.qrRole === 'create'
        ? t('送信側', 'Sender')
        : t('受信側', 'Receiver');

      // Also update the status label
      $('deviceInfoLabel').textContent = `${DEVICE.icon} ${DEVICE.label} (${DEVICE.type})`;
    }

    /* ── QR island helpers ── */
    let qrScanFrameId = null;
    const qrScanCanvas = document.createElement('canvas');
    const qrScanContext = qrScanCanvas.getContext('2d', { willReadFrequently: true });

    function parseQrPayload(rawValue) {
      try {
        const payload = JSON.parse(rawValue);
        const sessionId = payload.sessionId || payload.sess;
        const peerId = payload.peerId || payload.uid;
        if (!sessionId || !peerId) return null;
        return { sessionId, peerId, name: payload.name || '' };
      } catch {
        return null;
      }
    }

    let islandTransitionTimer = null;

    function revealIsland(mode) {
      const island = $('dynamicIsland');
      clearTimeout(islandTransitionTimer);
      island.classList.remove('active', 'island-closing');
      island.classList.add('island-opening');
      island.dataset.mode = mode;
      island.setAttribute('aria-expanded', 'true');

      // Give the browser one collapsed frame above the safe area, then unfold.
      void island.offsetWidth;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        island.classList.add('active');
        island.classList.remove('island-opening');
      }));

      return island;
    }

    function pairFromQrPayload(rawValue) {
      const payload = parseQrPayload(rawValue);
      if (!payload) {
        showToast(t('WebDropのQRコードではありません', 'This is not a WebDrop QR code'));
        return false;
      }
      if (!window.WebDrop?.wsClient?.connected) {
        showToast(t('サーバーに接続してから再試行してください', 'Connect to the server and try again'));
        return false;
      }
      window.WebDrop.wsClient.joinQrSession(payload.sessionId, payload.peerId);
      closeIsland();
      showToast(t('端末に接続中…', `Connecting to ${payload.name || 'device'}…`));
      return true;
    }

    function scanQrFrame() {
      const video = $('qr-video');
      if (!video.srcObject || !qrScanContext) return;

      if (video.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA && video.videoWidth && video.videoHeight) {
        qrScanCanvas.width = video.videoWidth;
        qrScanCanvas.height = video.videoHeight;
        qrScanContext.drawImage(video, 0, 0, qrScanCanvas.width, qrScanCanvas.height);
        const frame = qrScanContext.getImageData(0, 0, qrScanCanvas.width, qrScanCanvas.height);
        const result = typeof jsQR === 'function'
          ? jsQR(frame.data, frame.width, frame.height, { inversionAttempts: 'dontInvert' })
          : null;
        if (result && pairFromQrPayload(result.data)) return;
      }

      qrScanFrameId = requestAnimationFrame(scanQrFrame);
    }

    window.WebDropQR = { parsePayload: parseQrPayload, openScan: () => openQRScan() };

    async function openQRCreate() {
      $('settingsModal').classList.remove('active');
      if (!window.WebDrop?.wsClient?.connected) {
        showToast(t('サーバーに接続中です', 'Connecting to the server…'));
        window.WebDrop?.wsClient?.connect(window.WebDrop.displayName, window.WebDrop.deviceType);
        return;
      }
      $('islandScanMode').style.display   = 'none';
      $('islandCreateMode').style.display = 'block';
      revealIsland('create');

      const qrImg     = $('qr-img');
      const spinner   = $('qrSpinner');
      qrImg.style.display    = 'none';
      spinner.style.display  = 'flex';

      const sessionId = crypto.randomUUID();
      $('dynamicIsland').dataset.qrSessionId = sessionId;
      window.WebDrop.wsClient.createQrSession(sessionId);

      // Build payload: include the live server session and peer identity.
      const payload = JSON.stringify({
        type: 'webdrop-pair',
        version: 1,
        peerId: USER.id,
        name: USER.name || $('myNameLabel').textContent,
        sessionId
      });

      // Let the shell finish unfolding before replacing the loading state.
      await new Promise(r => setTimeout(r, 1120));

      try {
        if (typeof QRCode !== 'undefined' && QRCode.toDataURL) {
          const dataUrl = await QRCode.toDataURL(payload, {
            width: 200, margin: 2,
            color: { dark: '#000000', light: '#ffffff' },
            errorCorrectionLevel: 'M'
          });
          qrImg.src          = dataUrl;
          qrImg.style.display   = 'block';
          spinner.style.display = 'none';
        } else {
          // Library not yet loaded — retry after short delay
          await new Promise(r => setTimeout(r, 1200));
          const dataUrl = await QRCode.toDataURL(payload, { width: 200, margin: 2 });
          qrImg.src          = dataUrl;
          qrImg.style.display   = 'block';
          spinner.style.display = 'none';
        }
      } catch (err) {
        console.error('QR generation failed:', err);
        spinner.style.display = 'none';
        showToast(t('QR生成失敗', 'QR generation failed'));
      }
    }

    async function openQRScan() {
      $('settingsModal').classList.remove('active');
      $('islandScanMode').style.display   = 'block';
      $('islandCreateMode').style.display = 'none';
      revealIsland('scan');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        const video = $('qr-video');
        video.srcObject = stream;
        await video.play();
        qrScanFrameId = requestAnimationFrame(scanQrFrame);
      } catch {
        showToast(t('カメラへのアクセスが拒否されました', 'Camera access denied'));
        closeIsland();
      }
    }

    function closeIsland() {
      const island = $('dynamicIsland');
      clearTimeout(islandTransitionTimer);
      island.classList.remove('active', 'island-opening');
      island.classList.add('island-closing');
      island.setAttribute('aria-expanded', 'false');
      delete island.dataset.qrSessionId;
      islandTransitionTimer = setTimeout(() => {
        island.classList.remove('island-closing');
        delete island.dataset.mode;
      }, 1120);
      cancelAnimationFrame(qrScanFrameId);
      qrScanFrameId = null;
      const vid = $('qr-video');
      if (vid.srcObject) {
        vid.srcObject.getTracks().forEach(tr => tr.stop());
        vid.srcObject = null;
      }
    }

    /* Single QR action button — role decided by device */
    $('btnQRAction').addEventListener('click', () => {
      if ($('btnQRAction').dataset.role === 'create') {
        openQRCreate();
      } else {
        openQRScan();
      }
    });

    folderQrBtn.addEventListener('click', e => {
      e.stopPropagation();
      openQRScan();
    });

    /* Tap the Dynamic Island itself to close it */
    $('dynamicIsland').addEventListener('click', e => {
      // Only close if already expanded and clicking the island background (not the canvas/video)
      if ($('dynamicIsland').classList.contains('active') &&
          (e.target === $('dynamicIsland') || e.target === $('islandScanMode') || e.target === $('islandCreateMode'))) {
        closeIsland();
      }
    });

    // Close island when clicking outside
    document.addEventListener('click', e => {
      const island = $('dynamicIsland');
      if (island.classList.contains('active') &&
          !island.contains(e.target) &&
          !$('btnQRAction').contains(e.target) &&
          !folderQrBtn.contains(e.target)) {
        closeIsland();
      }
    });

    /* ────────────────────────────────────
       Settings modal open/close
    ──────────────────────────────────── */
    $('settingsBtn').addEventListener('click', () => {
      $('settingsModal').classList.add('active');
      document.querySelector('.settings-content').scrollTop = 0;
    });
    $('closeSettings').addEventListener('click', () => $('settingsModal').classList.remove('active'));
    $('settingsModal').addEventListener('click', e => {
      if (e.target === $('settingsModal')) $('settingsModal').classList.remove('active');
    });

    /* Searching / Pulsating state */
    function startSearching() {
      setState(STATE.SEARCHING);
      showToast(t('端末を検索中…', 'Searching for devices…'), 6000);
    }

    /* ────────────────────────────────────
       WebDrop module events
    ──────────────────────────────────── */
    window.addEventListener('webdrop:ready', e => {
      $('deviceInfoLabel').textContent = `${DEVICE.icon} ${DEVICE.label}`;
      // Broadcast our profile as soon as WS is ready
      broadcastMyProfile();
    });
    window.addEventListener('webdrop:ws:connecting', () => {
      setStatDot('ws', 'connecting');
      $('settingsWsDot').dataset.status = 'connecting';
      $('settingsWsState').textContent = t('接続中…', 'Connecting…');
    });
    window.addEventListener('webdrop:ws:connected', () => {
      setStatDot('ws', 'connected');
      $('settingsWsDot').dataset.status = 'connected';
      $('settingsWsState').textContent = t('接続済み', 'Connected');
      broadcastMyProfile();
    });
    window.addEventListener('webdrop:ws:disconnected', () => {
      setStatDot('ws', 'disconnected');
      $('settingsWsDot').dataset.status = 'disconnected';
      $('settingsWsState').textContent = t('再接続中…', 'Reconnecting…');
    });
    window.addEventListener('webdrop:qr:paired', e => {
      closeIsland();
      showToast(t('端末と接続しました', `Connected to ${e.detail.peer?.displayName || 'device'}`), 4000);
    });

    /* ────────────────────────────────────
       Init
    ──────────────────────────────────── */
    setState(STATE.IDLE);
    setStatDot('ws', 'connecting');

    // Apply device-specific QR button + banner
    applyDeviceUI();

    // Apply user identity (name, photo, avatar)
    // applyUserIdentity() needs DEVICE to be defined first — it's above us, we're good
    applyUserIdentity();

    // Hide proximity-sensor dots for QR-only devices (Mac/iPhone — they use QR alone)
    const isQROnly = DEVICE.qrRole === 'create' || DEVICE.type === 'iPhone' || DEVICE.type === 'iPad';
    if (isQROnly) {
      ['stat-mic','stat-ultra','stat-tilt','stat-bump'].forEach(id => {
        const el = $(id);
        if (el) el.style.opacity = '0.3';
      });
      // Pre-mark as N/A
      ['mic','ultra','tilt','bump'].forEach(k => setStatDot(k, 'unknown'));
    } else {
      // Restore cached permission dots for proximity-capable devices
      (['mic','bump','tilt']).forEach(key => {
        const cached = PermCache.get(key);
        if (cached) setStatDot(key, cached);
      });
      const cachedMic = PermCache.get('mic');
      if (cachedMic) setStatDot('ultra', cachedMic);
    }
  </script>

</body>
</html>

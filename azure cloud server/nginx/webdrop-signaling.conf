upstream webdrop_signaling {
    server 127.0.0.1:8080;
    keepalive 256;
}

server {
    listen 80;
    listen [::]:80;
    server_name signal.webdrop.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name signal.webdrop.example.com;

    ssl_certificate /etc/letsencrypt/live/signal.webdrop.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/signal.webdrop.example.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 128k;
    proxy_buffering off;
    gzip off;
    add_header Permissions-Policy "microphone=(), camera=(), accelerometer=(), gyroscope=(), magnetometer=()" always;

    location /healthz {
        proxy_pass http://webdrop_signaling;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /readyz {
        proxy_pass http://webdrop_signaling;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ice-servers {
        proxy_pass http://webdrop_signaling;
        proxy_http_version 1.1;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/relay-policy {
        proxy_pass http://webdrop_signaling;
        proxy_http_version 1.1;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/proximity-policy {
        proxy_pass http://webdrop_signaling;
        proxy_http_version 1.1;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/metrics-summary {
        proxy_pass http://webdrop_signaling;
        proxy_http_version 1.1;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/diagnostics-public {
        proxy_pass http://webdrop_signaling;
        proxy_http_version 1.1;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/diagnostics-snapshot {
        proxy_pass http://webdrop_signaling;
        proxy_http_version 1.1;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization $http_authorization;
    }

    location /ws {
        proxy_pass http://webdrop_signaling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
